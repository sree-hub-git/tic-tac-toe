<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti-Gravity Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1 style="color: var(--text-color); font-size: 2.5em;">Anti-Gravity Tic-Tac-Toe</h1>
  <div id="board">
    <div class="cell" data-index="0" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="1" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="2" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="3" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="4" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="5" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="6" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="7" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="8" style="background: var(--bg-color);"></div>
    <div class="cell" data-index="9" style="background: var(--bg-color);"></div>
  </div>
  <p id="status">Your turn: X</p>
  <div id="score-board">
    <h2>Scores</h2>
    <ul id="scores"></ul>
  </div>
  <script src="game.js"></script>
</body>
</html>
